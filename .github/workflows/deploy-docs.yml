name: Deploy Docs
run-name: "Deploy Docs — ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
  workflow_dispatch:

# id-token:write lets the GitHub OIDC provider mint a token that Azure trusts.
permissions:
  id-token: write
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: true

env:
  STORAGE_ACCOUNT: vardecdn
  SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://varde.variant.dev

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run build:docs

      - name: Azure login
        uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.SUBSCRIPTION_ID }}

      # Syncs docs/dist/ to the root of the $web container.
      # --delete-destination is intentionally omitted so blobs managed by other
      # workflows (/v/* versioned CSS, /static/* fonts) are not deleted.
      - name: Sync docs to Azure Storage
        run: |
          az storage blob sync \
            --account-name "$STORAGE_ACCOUNT" \
            --container '$web' \
            --source docs/dist/ \
            --destination '' \
            --auth-mode login \
            --only-show-errors

      - name: Summary
        run: |
          echo "### ✅ Docs deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Commit: [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://varde.variant.dev" >> $GITHUB_STEP_SUMMARY
