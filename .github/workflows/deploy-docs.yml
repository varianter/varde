name: Deploy Docs
run-name: "Deploy Docs — ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun install

      - name: Build docs
        run: bun run build:docs

      - name: Configure Pages
        uses: actions/configure-pages@v6

      # IMPORTANT: This uploads `docs/dist/varde` (not `docs/dist`) as the Pages root,
      # meaning GitHub Pages serves that directory at `/`. The font files are therefore
      # copied into `docs/dist/varde/static/` during build so that `/static/fonts/...`
      # resolves correctly. If you change this path, update STATIC_DEST in docs/src/build.tsx.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist/varde

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
